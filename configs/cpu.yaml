# Nimbus-1 — CPU config
# Slow but runs on any machine. Good for debugging / smoke tests.

n_layer: 6
n_head: 6
n_embd: 384
block_size: 256
gradient_checkpointing: false
use_flash_attn: false
norm_type: layernorm

batch_size: 2
grad_accum_steps: 8
max_iters: 1000
eval_interval: 100
eval_iters: 20
log_interval: 10

learning_rate: 0.0006
warmup_iters: 50
lr_decay_iters: 1000
min_lr: 0.00006

device: cpu
dtype: float32
compile: false
num_workers: 0
