# Nimbus-1 — Multi-GPU DDP config
# Launch with: python launch.py --gpus N
# Or manually: torchrun --nproc_per_node=N train.py --config configs/multi_gpu.yaml
#
# Effective batch stays at ~524k tokens regardless of GPU count.
# grad_accum_steps scales down automatically per GPU.

n_layer: 12
n_head: 12
n_embd: 768
block_size: 1024
gradient_checkpointing: false
use_flash_attn: true
norm_type: layernorm

batch_size: 8
grad_accum_steps: 16           # with 4x GPUs: 8 * 16 * 4 * 1024 = 524,288 tokens
max_iters: 19073
eval_interval: 500
eval_iters: 100
log_interval: 10

learning_rate: 0.0006
warmup_iters: 715
lr_decay_iters: 19073
min_lr: 0.00006

device: cuda
dtype: bfloat16
compile: true
compile_mode: max-autotune
num_workers: 4
