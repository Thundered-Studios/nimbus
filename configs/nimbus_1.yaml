# Nimbus-1 — Default full training config (A100 40GB)
# For other hardware, use the hardware-specific configs or run: python launch.py

n_layer: 12
n_head: 12
n_embd: 768
block_size: 1024
vocab_size: 50257
dropout: 0.0
bias: true
gradient_checkpointing: false
use_flash_attn: true
norm_type: layernorm

data_dir: data
out_dir: out

max_iters: 19073
batch_size: 8
grad_accum_steps: 64
eval_interval: 500
eval_iters: 100
log_interval: 10
save_interval: 1000

learning_rate: 0.0006
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

warmup_iters: 715
lr_decay_iters: 19073
min_lr: 0.00006

device: auto
dtype: bfloat16
compile: true
compile_mode: max-autotune
seed: 1337
num_workers: 4
