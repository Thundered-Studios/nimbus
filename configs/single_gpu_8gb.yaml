# Nimbus-1 — Single GPU, small VRAM (8–16 GB)
# Tested on RTX 3080, RTX 4080, RTX 3090.
# Gradient checkpointing enabled to fit in 8 GB.

n_layer: 12
n_head: 12
n_embd: 768
block_size: 1024
gradient_checkpointing: true   # saves ~40% VRAM, ~20% slower
use_flash_attn: true
norm_type: layernorm

batch_size: 4
grad_accum_steps: 128          # effective batch ~524k tokens
max_iters: 19073
eval_interval: 500
eval_iters: 100
log_interval: 10

learning_rate: 0.0006
warmup_iters: 715
lr_decay_iters: 19073
min_lr: 0.00006

device: cuda
dtype: bfloat16
compile: true
compile_mode: max-autotune
num_workers: 4
